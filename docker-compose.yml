version: "3.9"



services:

  db:

    image: postgres:15

    container_name: taxi_postgres

    restart: always

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: 2008

      POSTGRES_DB: taxi_db

    ports:

      - "5434:5432"   # 🔥 yangi port

    volumes:

      - postgres_data:/var/lib/postgresql/data



  redis:

    image: redis:7

    container_name: taxi_redis

    restart: always

    ports:

      - "6380:6379"   # 🔥 yangi port



  app:

    build: .

    container_name: taxi_app

    restart: always

    env_file:

      - .env

    ports:

      - "3000:3000"

    depends_on:

      - db

      - redis

    command: >

      sh -c "

        npx prisma generate &&

        npx prisma migrate deploy &&

        npm run start:prod

      "

    environment:

      DATABASE_URL: postgresql://postgres:2008@db:5432/taxi_db

      REDIS_HOST: redis

      REDIS_PORT: 6379



volumes:

  postgres_data: