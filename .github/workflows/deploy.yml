name: Deploy NestJS + PostgreSQL + Redis to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "📁 Creating app folder if not exists..."
            mkdir -p /taxi_backend
            cd /taxi_backend

            if [ ! -d "taxi_backend/.git" ]; then
               echo "📥 Cloning repository via SSH..."
               git clone git@github.com:tuxtasinboyev/taxi-backend.git taxi_backend
            fi

            cd taxi_backend

            echo "♻️ Reset, clean and pull latest code..."
            git reset --hard
            git clean -fd
            git pull origin main

            echo "🛑 Stopping existing containers..."
            docker compose down || true

            echo "🛠️ Building new containers..."
            docker compose build

            echo "🚀 Starting containers..."
            docker compose up -d

            echo "🎉 Deploy finished successfully!"
